<!DOCTYPE html>
<html>
<body>

<input id="msg">
<button onclick="send()">Send</button>

<ul id="list"></ul>

<script>

const API =
    "http://localhost:3000";

async function load() {
    const res =
        await fetch(API + "/messages");

    const data =
        await res.json();

    document.getElementById("list").innerHTML =
        data.map(m => `<li>${m}</li>`).join("");
}

async function send() {

    const msg =
        document.getElementById("msg").value;

    await fetch(API + "/messages", {
        method: "POST",
        headers: {
            "Content-Type":
            "application/json"
        },
        body: JSON.stringify({
            message: msg
        })
    });

    load();
}

load();

</script>

</body>
</html>
